<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f4ecf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Слова из букв</title>
  <!-- Шрифт грузим через preconnect, но саму stylesheet делаем неблокирующей
       и с fallback'ом на стоковый — на устройствах без интернета (или с
       блокировкой fonts.googleapis.com) приложение всё равно загрузится. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="styles.css">
  <!-- Минимальный inline-стиль для загрузочного и аварийного экранов —
       работает даже если styles.css не подтянулся. Гарантия что белого
       экрана у пользователя НЕ будет ни при каком сценарии. -->
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1a1230; color: #f5f3ff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #boot-fallback { position: fixed; inset: 0; padding: 24px; box-sizing: border-box; overflow: auto;
                     display: flex; flex-direction: column; align-items: center; justify-content: center;
                     text-align: center; font-size: 15px; line-height: 1.5; }
    #boot-fallback h1 { font-size: 20px; margin: 0 0 12px; font-weight: 600; }
    #boot-fallback pre { text-align: left; white-space: pre-wrap; word-break: break-word;
                         background: rgba(255,255,255,0.08); padding: 12px; border-radius: 8px;
                         font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; max-width: 100%; }
  </style>
  <script>
    // === Глобальный error reporter ===
    // Любая ошибка в загрузке/исполнении JS до того как ui.js успеет нарисовать
    // что-то — показывается прямо на экране. Это спасает от ситуации
    // «белый экран без объяснений», особенно для модератора стора.
    (function () {
      function showError(prefix, detail) {
        try {
          var node = document.getElementById('boot-fallback');
          if (!node) {
            node = document.createElement('div');
            node.id = 'boot-fallback';
            (document.body || document.documentElement).appendChild(node);
          }
          node.innerHTML =
            '<h1>Ошибка запуска</h1>' +
            '<pre>' + prefix + ':\n' +
              String(detail).replace(/[<>&]/g, function(c){return c==='<'?'&lt;':c==='>'?'&gt;':'&amp;';}) +
            '</pre>' +
            '<p style="opacity:0.7;font-size:12px">Пожалуйста, пришлите скриншот этой страницы разработчику.</p>';
        } catch (_) { /* nothing else we can do */ }
      }
      window.addEventListener('error', function (e) {
        showError('Error in ' + (e.filename || '?') + ':' + (e.lineno || '?'),
                  (e.message || 'unknown') + (e.error && e.error.stack ? '\n' + e.error.stack : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason || {};
        showError('Unhandled rejection', (r.message || r) + (r.stack ? '\n' + r.stack : ''));
      });
      // Watchdog: если через 8 сек loading-screen всё ещё на месте — что-то
      // зависло (модуль не загрузился без явного error event'а). Покажем
      // диагностику чтобы модератор мог сообщить детали.
      setTimeout(function () {
        var loading = document.getElementById('loading');
        if (loading && document.body.contains(loading)) {
          showError('Startup timed out',
                    'main.js did not finish bootstrap within 8 seconds.\n' +
                    'ua=' + (navigator && navigator.userAgent) + '\n' +
                    'release=' + (window.__BUILD_RELEASE__ ? 'yes' : 'no'));
        }
      }, 8000);
    })();

    // === Pre-paint theme bootstrap ===
    // Без него в dark-режиме мелькает светлый фон на ~100 мс до загрузки ui.js.
    (function () {
      try {
        var raw = localStorage.getItem('02words_save');
        if (!raw) return;
        var s = JSON.parse(raw);
        if (s && s.settings && s.settings.theme === 'dark') {
          document.documentElement.dataset.theme = 'dark';
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#0a0820');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading-screen">Загрузка…</div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
