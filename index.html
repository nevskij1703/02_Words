<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f4ecf7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Слова из букв</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Pre-paint theme bootstrap — без него в dark-режиме мелькает светлый фон
    // на ~100 мс до загрузки ui.js. Читаем сохранённое значение синхронно
    // прямо до парсинга <body>.
    (function () {
      try {
        var raw = localStorage.getItem('02words_save');
        if (!raw) return;
        var s = JSON.parse(raw);
        if (s && s.settings && s.settings.theme === 'dark') {
          document.documentElement.dataset.theme = 'dark';
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#0a0820');
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <div id="app">
    <div id="loading" class="loading-screen">Загрузка…</div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
